<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places Along the Route</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .place-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .place-card span {
            font-weight: 500;
            color: #444;
        }
        .checkbox {
            transform: scale(1.3);
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Places Along the Route</h2>

        <div class="place-card">
            <span>🏨 Taj Hotel</span>
            <input type="checkbox" class="checkbox">
        </div>
        <div class="place-card">
            <span>🍽️ Marina Bay Restaurant</span>
            <input type="checkbox" class="checkbox">
        </div>
        <div class="place-card">
            <span>🏛️ Kapaleeshwarar Temple</span>
            <input type="checkbox" class="checkbox">
        </div>
        <div class="place-card">
            <span>📍 Mahabalipuram</span>
            <input type="checkbox" class="checkbox">
        </div>
        <div class="place-card">
            <span>💡 Did You Know? Marina Beach is the 2nd longest beach in the world!</span>
        </div>

        <button class="submit-btn">Submit</button>
    </div>
    <script>
        function proceedToCostPage() {
            let selectedPlaces = [];
            document.querySelectorAll(".checkbox").forEach(checkbox => {
                if (checkbox.checked) {
                    selectedPlaces.push({
                        name: checkbox.dataset.name,
                        cost: checkbox.dataset.cost
                    });
                }
            });
    
            if (selectedPlaces.length === 0) {
                alert("Please select at least one place.");
                return;
            }
    
            localStorage.setItem("selectedPlaces", JSON.stringify(selectedPlaces));
            window.location.href = "Calculation.html"; // Redirect to cost page
        }
    </script>   
    <button onclick="proceedToCostPage()">Proceed</button>    
</body>
</html>
