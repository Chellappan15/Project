<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Monument Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: black;
    }

    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    #model-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #toggle-camera {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      padding: 10px 15px;
      font-size: 16px;
      background-color: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div id="model-container"></div>
<button id="toggle-camera">Switch Camera</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  let currentFacingMode = 'environment'; // 'user' or 'environment'
  let currentStream;

  const video = document.getElementById('video');
  const toggleButton = document.getElementById('toggle-camera');

  async function startCamera(facingMode = 'environment') {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: facingMode } },
        audio: false
      });

      currentStream = stream;
      video.srcObject = stream;
    } catch (err) {
      console.error('Error accessing camera:', err);
    }
  }

  toggleButton.addEventListener('click', () => {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    startCamera(currentFacingMode);
  });

  document.addEventListener('DOMContentLoaded', () => {
    startCamera(currentFacingMode);
  });

  let scene, camera, renderer, model, controls;

  function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    document.getElementById('model-container').appendChild(renderer.domElement);

    // camera.position.z = 5;
    
    camera.position.z = 10;
    camera.position.x = -6;
    camera.position.y = 20;

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.25;
    controls.enableZoom = true;
    controls.enablePan = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 1, 1).normalize();
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xffffff, 2, 50);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    loadModel('/models/taj_mahal_lego_set/scene.gltf');
  }

  function loadModel(modelPath) {
    if (model) scene.remove(model);

    const loader = new THREE.GLTFLoader();
    loader.load(modelPath, (gltf) => {
      model = gltf.scene;
      model.position.set(0, 0, 0);
      model.scale.set(1, 1, 1);
      scene.add(model);

      const box = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      box.getCenter(center);
      controls.target.copy(center);
      controls.update();

      render();
    }, undefined, (error) => {
      console.error('Model load error:', error);
    });
  }

  function render() {
    requestAnimationFrame(render);
    controls.update();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  init();
</script>

</body>
</html>
