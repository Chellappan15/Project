<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #f4f4f4;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
        }
        .left, .right {
            padding: 15px;
        }
        .left {
            flex: 1;
            border-right: 2px solid #ddd;
        }
        .right {
            flex: 0.7;
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }
        .place-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .place-card span {
            font-weight: 500;
            color: #444;
        }
        .checkbox {
            transform: scale(1.3);
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background: #0056b3;
        }
        .cost-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .cost-section h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .total-cost {
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
        }
        .left p{
          text-align: right;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Left Section -->
        <div class="left">
            <h2>Select Places Along Route</h2>
            <h3>Hotels</h3>
            <div class="place-card">
                <span>🏨 Hotel Mahendra Plaza - ₹2000</span>
                <input type="checkbox" class="checkbox" data-cost="2000">
            </div>
            <div class="place-card">
                <span>🍽️ Vandan Guest House/Hotel - ₹2000</span>
                <input type="checkbox" class="checkbox" data-cost="2000">
            </div>
            <h3>Temples</h3>
            <div class="place-card">
                <span>🏛️ Rajeshwar Temple - ₹50</span>
                <input type="checkbox" class="checkbox" data-cost="50">
            </div>
            <h3>Gas</h3>
            <div class="place-card">
                <span>📍 IndianOil - ₹500</span>
                <input type="checkbox" class="checkbox" data-cost="1000">
            </div>
            <h3>Hospitals</h3>
            <div class="place-card">
                <span>🏥 Good Health Hospital</span>
            </div>
            <div class="place-card">
                <span>🏥 Jay Hind Hospital</span>
            </div>
            <p>*Calculated For Per Person</p>

        </div>

        <!-- Right Section -->
        <div class="right">
            <h2>Predicted Cost</h2>
            <div class="cost-section">
                <h3>Total Estimated Cost</h3>
                <p class="total-cost">₹0</p>
            </div>
        </div>
    </div>

    <script>
        const checkboxes = document.querySelectorAll(".checkbox");
        const totalCostElement = document.querySelector(".total-cost");

        function updateCost() {
            let totalCost = 0;
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    totalCost += parseInt(checkbox.dataset.cost);
                }
            });
            totalCostElement.textContent = `₹${totalCost}`;
        }

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener("change", updateCost);
        });
    </script>

</body>
</html>
