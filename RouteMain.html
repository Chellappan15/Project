<!-- route.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Routes</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Your Saved Routes</h1>
    <img src="https://th.bing.com/th/id/OIP.vSoYu1dFvRg4_-H7V1yWmQHaGu?w=135&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7">
    <ul>
        <li id="route">Route 1: Uttar Pradesh to Agra(Taj Mahal)</li>
    </ul>
    <script>
        document.getElementById('route').addEventListener('click',function(){
            window.location.href = '/Route/Location';
        });
    </script>
</body>
</html>
